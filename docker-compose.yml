services:
  postgres:
    image: postgres:16-alpine
    container_name: production-ready-store-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: production_ready_store
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d production_ready_store"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
